<style>

.星空 {
    position: relative;
    width: 100%;
    overflow: clip; 
    background: black url('img/nebula.webp') fixed;
}

.星空レイヤー {
    position: fixed; /* scroll(root)と同期させるため画面に固定配置 */
    top: 0;
    left: 0;
    width: 100%;
    height: 150vh; /* スクロールしてズレる余白を多めに確保 */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    will-change: transform, opacity; /* GPUアクセラレーションの準備 */
    pointer-events: none;
}

.遠景 {
    background-image: url('img/nebula.webp');
    z-index: 1;
    animation: 遠景の動き 1s linear forwards;
    animation-timeline: scroll(root); /* ブラウザ全体のスクロールに同期 (中景以下も同様) */
}
.中景 {
    background-image: url('img/space.webp');
    z-index: 2;
    animation:
        中景の動き 1s linear forwards,
        中景の瞬き 1.3s ease-in-out infinite alternate;
    animation-timeline: scroll(root), auto;
}
.近景 {
    background-image: url('img/stars.webp');
    z-index: 3;
    animation:
        近景の動き 1s linear forwards,
        近景の瞬き 1.9s ease-in-out infinite alternate;
    animation-timeline: scroll(root), auto;
}

@keyframes 遠景の動き {
    from { transform: translateY(0); }
    to   { transform: translateY(-100px); } /* 低速 */
}
@keyframes 中景の動き {
    from { transform: translateY(0); }
    to   { transform: translateY(-300px); } /* 中速 */
}
@keyframes 近景の動き {
    from { transform: translateY(0); }
    to   { transform: translateY(-900px); } /* 高速 */
}

@keyframes 中景の瞬き {
      0% {opacity: 0.5;}
     50% {opacity: 1.0;}
    100% {opacity: 0.6;}
}
@keyframes 近景の瞬き {
      0% { opacity: 1.0; }
     50% { opacity: 0.5; }
    100% { opacity: 0.9; }
}

/* スクロールさせるための高さを確保するダミーコンテンツ */
.content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 1000vh; /* 画面3倍分のスクロール領域を作ります */
  color: #ffffff;
  font-family: sans-serif;
}
</style>


<div class="星空">
    <div class="星空レイヤー 遠景"></div>
    <div class="星空レイヤー 中景"></div>
    <div class="星空レイヤー 近景"></div>
  
  <!-- コンテンツ（文字など） -->
  <div class="content">
    <h1>Cosmic Journey</h1>
    <p>スクロールして宇宙の奥行きを体感してください。</p>
  </div>
</div>
