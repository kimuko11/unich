<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script src="script.js" defer></script>
    <title>📻宇宙よろず相談室 🎬#001</title>
</head>
<body>

<div class="宇宙全体">
    <div class="宇宙レイヤー 遠景"></div>

    <div class="宇宙レイヤー 近景"></div>
    <div style="height: 100vh;"></div>

    <main class="対話全体枠">

         <!-- #️⃣デフォルトstyle キャラ画像 "--被り幅: -25px;", 💬 "--左余白: 16%;", "--右余白: 14%;"
                変更したい時は class="キャラ画像" や class="💬" の後に style=" " を追加して上記変数を代入 -->

        <div class="🐰 左">
            <div class="キャラ画像">
                <div class="横揺れ">
                    <img src="cha/ut_genkina-aisatu.webp" alt="ユニ通常：元気な挨拶">
                    <img src="cha/ut_genkina-aisatu_kuchi.webp" class="口パク">
                    <img src="cha/ut_genkina-aisatu_heart.webp" class="ハート">
                </div>
            </div>
            <div class="💬 中速">
                リスナーのあらゆゆ疑問や悩みにこたえゆ「<big>宇宙よろず相談室</big>」！<br>
                みんなのアイドル、<big>ユニちゃん</big>でしゅ！
            </div>
        </div>

        <div class="🥸">
            <div class="キャラ画像">
                <div class="縦伸縮">
                    <img src="cha/dt_figure.webp" alt="ドク通常：フィギュア">
                    <img src="cha/dt_figure_figure.webp" class="フィギュア">
                    <img src="cha/dt_figure_heart.webp" class="ハート">
                </div>
            </div>
            <div class="💬" style="--右余白: 19%;">
                デュフフww<br>
                本日は行きつけの中古ショップでプレミア価格10倍の絶版フィギュアを保護できて大満足の <big>Dr.YOU (ドクター・ユー</big>) ですぢゃ♥️
            </div>
        </div>

                <div class="🐰 左">
            <div class="キャラ画像">
                <div class="驚きと縦伸縮">
                    <img src="cha/ut_odoroki.webp" alt="ユニ通常：驚き">
                    <img src="cha/ut_odoroki_kuchi.webp" class="口パク">
                    <img src="cha/ut_odoroki_odoroki.webp" class="驚き汗">
                </div>
            </div>
            <div class="💬 高速">
                ぬわにっ!?<br>
                おま、今月の生活費は残りきびちーって口をすっぱくちてゆってたのにまた…耳をなくちたんか！<br>
                だいたいフィギュアなどと…精神的に成長ちた人間は「偶像崇拝」などちないのだから、ドクターなら年相応におちついて局の財政に貢献すゆがとーぜんなのでしゅ！
            </div>
        </div>

        <div class="🥸">
            <div class="キャラ画像">
                <div class="横揺れ">
                    <img src="cha/dt_figure.webp" alt="ドク通常：フィギュア">
                </div>
            </div>
            <div class="💬 無声">
                突然ですが、モノローグのテストをば…<br>しゃっちょ、お給料を上げてくだされ～
            </div>
        </div>


    </main> <!-- 対話全体枠 ここまで -->

    <div style="height: 100vh;"></div>

</div> <!-- 宇宙全体 ここまで -->
